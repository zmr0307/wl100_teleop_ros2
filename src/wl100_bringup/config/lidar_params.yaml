# Unitree LiDAR-L2 雷达参数
# 参考 LIDAR_L2_DOC.md 配置

/**:
  ros__parameters:
    # 初始化模式: 1=串口, 2=UDP网口
    initialize_type: 2

    # 工作模式 (workMode 位掩码)
    # 0 = 标准FOV + 3D + IMU使能 + ENET + 自启
    work_mode: 0

    # 网络配置
    lidar_ip: "192.168.1.62"
    lidar_port: 6101
    local_ip: "192.168.1.2"
    local_port: 6201

    # 点云参数
    cloud_scan_num: 18
    use_system_timestamp: true
    range_min: 0.0
    range_max: 30.0

    # 话题与坐标系
    cloud_frame: "unilidar_lidar"
    cloud_topic: "unilidar/cloud"
    imu_frame: "unilidar_imu"
    imu_topic: "unilidar/imu"
